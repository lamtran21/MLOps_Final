services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    environment:
      FASTAPI_URL: http://api:8000
      EVIDENTLY_CLOUD_URL: ${EVIDENTLY_CLOUD_URL:-https://app.evidently.cloud}
    depends_on:
      api:
        condition: service_healthy
